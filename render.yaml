# Blueprint Render.com — plan gratuito (puede dormir tras inactividad).
# Dashboard: New → Blueprint → conectar repo y aplicar este archivo.
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: syscom-iot
    runtime: node
    plan: free
    region: oregon
    # Incluir devDependencies: Vite está ahí y hace falta para `npm run build`.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/setup/status
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      # node:sqlite (store.js) sigue siendo experimental en Node 22 sin esta opción.
      - key: NODE_OPTIONS
        value: "--experimental-sqlite"
      - key: NODE_ENV
        value: production
      # LNS Semtech UDP (LNS_UDP_PORT) no aplica en Render Web Service (solo HTTP). Ver docs/LNS-SEMTECH-UDP.md
      # Obligatorio: en Render → servicio syscom-iot → Environment → añade JWT_SECRET (cadena larga aleatoria).
      # Si falta, el login puede fallar o ser inseguro.
